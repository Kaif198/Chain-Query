<!DOCTYPE html>
<html class="dark h-full w-full" lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChainQuery — Supply Chain SQL Analytics Platform. Run SQL queries against supply chain data and auto-generate charts." />
  <title>ChainQuery — Supply Chain SQL Analytics</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Inter:wght@100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "var(--bg)",
            "surface": "var(--surface)",
            "surface-container": "var(--surface-container)",
            "surface-container-low": "var(--surface-container-low)",
            "surface-container-high": "var(--surface-container-high)",
            "surface-container-highest": "var(--surface-container-highest)",
            "surface-container-lowest": "var(--surface-container-lowest)",
            "on-background": "var(--on-bg)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "outline": "var(--outline)",
            "outline-variant": "var(--outline-variant)",
            "primary": "var(--primary)",
            "primary-container": "var(--primary-container)",
            "on-primary": "var(--on-primary)",
            "secondary": "var(--secondary)",
            "error": "var(--error)",
          },
          fontFamily: {
            "headline": ["Geist", "Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"],
            "mono": ["Geist Mono", "monospace"],
          },
          borderRadius: {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem",
          },
        },
      },
    }
  </script>
  <style>
    /* Dark Theme Tokens */
    .dark {
      --bg: #09090B;
      --surface: #111113;
      --surface-container: #201f22;
      --surface-container-low: #1c1b1d;
      --surface-container-high: #2a2a2c;
      --surface-container-highest: #353437;
      --surface-container-lowest: #0e0e10;
      --on-bg: #e5e1e4;
      --on-surface: #e5e1e4;
      --on-surface-variant: #a1a1aa;
      --outline: #27272a;
      --outline-variant: #434655;
      --primary: #2563eb;
      --primary-container: #2563eb;
      --on-primary: #ffffff;
      --secondary: #71717a;
      --error: #ef4444;
    }
    /* Light Theme Tokens */
    .light {
      --bg: #FAFAFA;
      --surface: #ffffff;
      --surface-container: #fafafa;
      --surface-container-low: #fafafa;
      --surface-container-high: #f4f4f5;
      --surface-container-highest: #e4e4e7;
      --surface-container-lowest: #ffffff;
      --on-bg: #09090b;
      --on-surface: #09090b;
      --on-surface-variant: #71717a;
      --outline: #e4e4e7;
      --outline-variant: #e4e4e7;
      --primary: #2563eb;
      --primary-container: #2563eb;
      --on-primary: #ffffff;
      --secondary: #71717a;
      --error: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
      font-size: 20px;
    }
    .mono-text { font-family: 'Geist Mono', monospace; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    .light ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
    .light ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    .syntax-keyword { color: #60a5fa; font-weight: 600; }
    .syntax-string { color: #4ade80; }
    .syntax-number { color: #fbbf24; }
    .syntax-comment { color: #71717a; font-style: italic; }
    .syntax-function { color: #a78bfa; }
    * { transition: background-color 200ms ease, border-color 200ms ease, color 200ms ease; }
  </style>
</head>
<body class="overflow-hidden w-full h-full">
  <div id="root" class="w-full h-full"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
